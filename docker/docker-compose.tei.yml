version: "3.8"

services:
  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    ports:
      - "8080:80"
    volumes:
      - /root/.cache/huggingface:/root/.cache/huggingface
    environment:
      # Multilingual default (EN/ID + majors). Swap this + --model-id below to change models.
      - MODEL_ID=intfloat/multilingual-e5-small
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface/hub
    command:
      - --model-id
      - intfloat/multilingual-e5-small
      - --port
      - "80"
      - --max-input-length
      - "512"
      - --auto-truncate
    # GPU support (uncomment if you have nvidia-docker):
    # image: ghcr.io/huggingface/text-embeddings-inference:1.6
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
